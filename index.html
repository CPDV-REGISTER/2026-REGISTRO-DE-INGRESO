<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Acceso Dual - Chile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 20px; }
        .scanner-input-group { background: #e9ecef; border: 2px dashed #ced4da; padding: 15px; border-radius: 20px; margin-bottom: 20px}
        #campoPatente { display: none; } /* Oculto por defecto */
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <h2 class="text-center mb-4">Registro de Ingreso</h2>

            <div class="text-center mb-3">
                <button class="btn btn-primary w-100 mb-2" onclick="encenderCamara()">
                    Usar Cámara del Dispositivo
                </button>
                <div id="reader"></div> </div>


            <div class="scanner-input-group">
            <div class="text-center mb-3">
                <label class="form-label"><strong>Lector de Carnet</strong></label>
                <input type="text" id="inputScanner" class="form-control" placeholder="Haga clic aquí y escanee el carnet..." onkeypress="manejarEscaneoPistola(event)">
                <small class="text-muted">Si usa escáner de pistola, el cursor debe estar aquí.</small>
            </div>
         </div>

            <form id="registroForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">RUN (Cédula)</label>
                        <input type="text" id="run" class="form-control" placeholder="12.345.678-9" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="nombreCompleto" class="form-control" placeholder="Juan Pérez Tapia" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo de Entrada</label>
                        <select id="tipoEntrada" class="form-select" onchange="toggleVehiculo()">
                            <option value="peatonal">Peatonal</option>
                            <option value="vehicular">Vehicular</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3" id="campoPatente">
                        <label class="form-label text-primary"><strong>Patente del Vehículo</strong></label>
                        <input type="text" id="patente" class="form-control border-primary" placeholder="ABCD12">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Motivo de Ingreso</label>
                        <select id="motivo" class="form-select">
                            <option value="retiro enfermería">Retiro Enfermería</option>
                            <option value="retiro estudiante">Retiro Estudiante</option>
                            <option value="proveedor">Proveedor</option>
                            <option value="arriendos">Arriendo</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                <button type="submit" class="btn btn-success w-100 btn-lg">Finalizar Registro</button>
            </form>
        </div>
    </div>
</div>

<script>
    let html5QrCode;

    // --- LÓGICA DE LA CÁMARA ---
    function encenderCamara() {
        const readerDiv = document.getElementById('reader');
        readerDiv.style.display = 'block';

// 1. Especificamos explícitamente el formato PDF417
    html5QrCode = new Html5Qrcode("reader", { 
        formatsToSupport: [ Html5QrcodeSupportedFormats.PDF_417 ] 
    });

const config = { 
        fps: 20, // Más cuadros por segundo para capturar mejor
        qrbox: { width: 350, height: 150 }, // Caja rectangular como el carnet
        aspectRatio: 1.777778 
    };

        // Buscamos específicamente PDF417 (formato chileno)
html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (decodedText) => {
            console.log("Datos capturados:", decodedText); // Ver en consola qué lee
            procesarDatosChile(decodedText);
            html5QrCode.stop(); // Detener cámara tras éxito
            readerDiv.style.display = 'none';
        },
        (errorMessage) => { /* Escaneando... */ }
    ).catch(err => alert("Error de cámara: " + err));
}

    // --- LÓGICA DE LA PISTOLA ---
    function manejarEscaneoPistola(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            procesarDatosChile(event.target.value);
            event.target.value = '';
        }
    }

    // --- PROCESAMIENTO COMÚN (Chile) ---
    function procesarDatosChile(cadena) {
alert("¡Cámara leyó algo!: " + cadena); // <--- AÑADE ESTO PARA TESTEAR
        const partes = cadena.split('|');
        if (partes.length >= 4) {
            let runLimpio = partes[0].replace(/^0+/, '');
            if (!runLimpio.includes('-')) {
                runLimpio = runLimpio.slice(0, -1) + "-" + runLimpio.slice(-1);
            }
            
            document.getElementById('run').value = runLimpio;
            document.getElementById('nombreCompleto').value = `${partes[3]} ${partes[1]} ${partes[2]}`;
            alert("Lectura exitosa");
        } else {
            alert("Código no reconocido. Asegúrese de escanear el reverso del carnet.");
        }
    }

    function toggleVehiculo() {
        const tipo = document.getElementById('tipoEntrada').value;
        document.getElementById('campoPatente').style.display = (tipo === 'vehicular') ? 'block' : 'none';
    }

    document.getElementById('registroForm').onsubmit = async function(e) {
    e.preventDefault();
    
    // URL que copiaste de Google Apps Script
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyVTzRclzL0VMeDBbQmw6-6c0OkYQpF-2SvqmIe6wJhsiXTnnQrHaxiR6JbrpsHvdXo8Q/exec"; 

    const datos = {
        run: document.getElementById('run').value,
        nombre: document.getElementById('nombreCompleto').value,
        tipo: document.getElementById('tipoEntrada').value,
        patente: document.getElementById('patente').value || "N/A",
        motivo: document.getElementById('motivo').value
    };

    try {
        const response = await fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors', // Importante para evitar bloqueos de seguridad simples
            cache: 'no-cache',
            body: JSON.stringify(datos)
        });

        alert("✅ Registro guardado en Google Sheets correctamente");
        this.reset();
        document.getElementById('campoPatente').style.display = 'none';
        
    } catch (error) {
        console.error("Error:", error);
        alert("❌ Error al guardar. Revisa la conexión.");
    }
};
</script>

</body>
</html>
