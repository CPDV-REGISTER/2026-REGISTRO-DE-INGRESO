<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Acceso Dual - Chile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* ESTILOS VISUALES NUEVOS */
        body { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('LINK_DE_TU_IMAGEN_DE_FONDO');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 20px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .form-container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .logo-colegio {
            max-width: 600px;
            display: block;
            margin: 0 auto 20px auto;
        }

        /* ESTILOS ORIGINALES MANTENIDOS Y MEJORADOS */
        #reader { width: 100% !important; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 20px; border: 2px solid #0d6efd !important; }
        .scanner-input-group { background: #f8f9fa; border: 2px dashed #ced4da; padding: 15px; border-radius: 20px; margin-bottom: 20px}
        #campoPatente { display: none; }
        .form-select { white-space: normal !important; height: auto !important; min-height: 50px; }
        .is-invalid { border-color: #dc3545 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <img src="LOGO-CPDV.png" alt="Logo Colegio" class="logo-colegio">
            
            <h2 class="text-center mb-4">Registro de Ingreso</h2>

            <div class="text-center mb-3">
                <button class="btn btn-primary w-100 mb-2" onclick="encenderCamara()">
                    Usar Cámara del Dispositivo
                </button>
                <div id="reader"></div> 
            </div>

            <div class="scanner-input-group">
                <div class="text-center mb-3">
                    <label class="form-label"><strong>Lector de Carnet / QR</strong></label>
                    <input type="text" id="inputScanner" class="form-control" placeholder="Haga clic aquí y escanee..." onkeypress="manejarEscaneoPistola(event)">
                    <small class="text-muted">Si usa escáner de pistola, el cursor debe estar aquí.</small>
                </div>
            </div>

            <form id="registroForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">RUN (Cédula)</label>
                        <input type="text" id="run" class="form-control" placeholder="12345678-9" oninput="this.value = formatearRUT(this.value); revisarValidezRUT(this.value)" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="nombreCompleto" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo de Entrada</label>
                        <select id="tipoEntrada" class="form-select" onchange="toggleVehiculo()">
                            <option value="peatonal">Peatonal</option>
                            <option value="vehicular">Vehicular</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3" id="campoPatente">
                        <label class="form-label text-primary"><strong>Patente</strong></label>
                        <input type="text" id="patente" class="form-control border-primary" placeholder="ABCD12">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Motivo de Ingreso</label>
                        <select id="motivo" class="form-select" onchange="verificarMotivoEspecial()">
                            <option value="">Seleccione una opción...</option>
                            <option value="APODERADO-RETIRO ESTUDIANTE/ENFERMERÍA">Apoderado-Retiro Estudiante/Enfermería</option>
                            <option value="APODERADO-ENTREGA DE ELEMENTOS">Apoderado-Entrega de elementos</option>
                            <option value="APODERADO-SELECCIONES/TALLERES CPDV">Apoderado-Selecciones/Talleres CPDV</option>
                            <option value="APODERADO-CITA ADMISIÓN/RECAUDACIÓN">Apoderado-Cita Admisión/recaudación</option>
                            <option value="APODERADO-CITA DOCENTE">Apoderado-Cita docente</option>
                            <option value="VISITA-ISP">Visita-ISP</option>
                            <option value="VISITA-SCHOOL TOUR/ADMISIÓN/RECAUDACIÓN">Visita-School tour/Admisión/Recaudación</option>
                            <option value="VISITA-ENTREVISTA">Visita-Entrevista</option>
                            <option value="VISITA-PERSONAL DE APOYO (PSICOLOGÍA, TERAPIA OCUPACIONAL)">Visita-Personal de apoyo (Psicología, Terapia ocupacional)</option>
                            <option value="VISITA-ARRIENDOS">Visita-Arriendos</option>
                            <option value="VISITA-PROVEEDORES">Visita-Proveedores</option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-3" id="contenedorExtra" style="display: none;">
                        <label class="form-label" id="labelExtra">Detalle de Visita</label>
                        <input type="text" id="detalleVisita" class="form-control" placeholder="">
                    </div>
                </div>

                <div class="col-md-6 mb-3" id="contenedorReferencia" style="display: none;">
                    <label class="form-label" id="labelReferencia">Referencia</label>
                    <input type="text" id="nombreReferencia" class="form-control" placeholder="...">
                </div>

                <button type="submit" class="btn btn-success w-100 btn-lg mt-3">Finalizar Registro</button>
            </form>
        </div>
    </div>
</div>

<script>
// --- FUNCIONES DE APOYO ---
function formatearRUT(rut) {
    let valor = rut.replace(/\./g, '').replace(/-/g, '').trim();
    if (valor.length < 2) return valor;
    let cuerpo = valor.slice(0, -1);
    let dv = valor.slice(-1).toUpperCase(); 
    return cuerpo + "-" + dv;
}

function validarRUT(rut) {
    let valor = rut.replace(/\./g, '').replace(/-/g, '').toUpperCase();
    if (valor.length < 8) return false;
    let cuerpo = valor.slice(0, -1);
    let dv = valor.slice(-1);
    let suma = 0, multiplo = 2;
    for (let i = 1; i <= cuerpo.length; i++) {
        suma += multiplo * valor.charAt(cuerpo.length - i);
        multiplo = (multiplo < 7) ? multiplo + 1 : 2;
    }
    let dvEsperado = 11 - (suma % 11);
    dv = (dv == 'K') ? 10 : dv;
    dv = (dv == 0) ? 11 : dv;
    return dvEsperado == dv;
}

function revisarValidezRUT(valor) {
    const input = document.getElementById('run');
    if (valor.length > 8) {
        input.classList.toggle("is-invalid", !validarRUT(valor));
    }
}

function toggleVehiculo() {
    const tipo = document.getElementById('tipoEntrada').value;
    document.getElementById('campoPatente').style.display = (tipo === 'vehicular') ? 'block' : 'none';
}

function verificarMotivoEspecial() {
    const motivo = document.getElementById('motivo').value;
    const contenedor = document.getElementById('contenedorExtra');
    const label = document.getElementById('labelExtra');
    const input = document.getElementById('detalleVisita');

    if (motivo === "VISITA-PROVEEDORES") {
        contenedor.style.display = "block";
        label.innerText = "Nombre de la Empresa/Proveedor";
        input.placeholder = "Ej: Soprole, Chilexpress, etc.";
    } 
    else if (motivo === "VISITA-ARRIENDOS") {
        contenedor.style.display = "block";
        label.innerText = "Nombre de la Organización/Arrendatario";
        input.placeholder = "Ej: Club Deportivo, Evento X, etc.";
    } 
    else {
        contenedor.style.display = "none";
        input.value = "";
    }
}

// --- LÓGICA DE ESCANEO ---
let html5QrCode;

function encenderCamara() {
    const readerDiv = document.getElementById('reader');
    readerDiv.style.display = 'block';
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 20, qrbox: { width: 300, height: 200 } };

    html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        procesarDatosChile(decodedText);
        setTimeout(() => { html5QrCode.stop(); readerDiv.style.display = 'none'; }, 1000);
    }).catch(err => alert("Error: " + err));
}

function manejarEscaneoPistola(event) {
    if (event.key === 'Enter') {
        event.preventDefault();
        procesarDatosChile(event.target.value);
        event.target.value = '';
    }
}

function procesarDatosChile(data) {
    // 1. TRADUCTOR DE TECLADO
    let dataCorregida = data.replace(/\]/g, '|').replace(/'/g, '-').trim();

    // 2. DETECCIÓN DE PASE DE INVITADO
    if (dataCorregida.toUpperCase().includes("PASE")) {
        const partes = dataCorregida.split('|');
        
        // El timestamp es la parte 8 (indice 7)
        if (partes.length >= 8) {
            
            // --- VALIDACIÓN DE TIEMPO (1 HORA) ---
            const timestampGeneracion = parseInt(partes[7]);
            const ahora = Date.now();
            const diferenciaMinutos = (ahora - timestampGeneracion) / (1000 * 60);
            
            // Convertir el timestamp a hora legible
            const horaLeible = new Date(timestampGeneracion).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            if (diferenciaMinutos > 60) {
                alert("❌ PASE VENCIDO\nEste código expiró hace " + Math.round(diferenciaMinutos - 60) + " minutos.\nGenerado a las: " + horaLeible);
                document.getElementById('registroForm').reset();
                return;
            }

            // --- LLENADO DE DATOS ---
            let rutInvitado = partes[1].replace(/\./g, '');
            if (!rutInvitado.includes('-')) {
                rutInvitado = rutInvitado.slice(0, -1) + "-" + rutInvitado.slice(-1);
            }

            document.getElementById('run').value = rutInvitado.toUpperCase();
            document.getElementById('nombreCompleto').value = partes[2] || "";
            document.getElementById('tipoEntrada').value = partes[3] || "peatonal";
            
            // BLINDAJE DE MOTIVO: Si el motivo no está en la lista, lo agregamos
            const motivoQR = partes[5] || "";
            const selectMotivo = document.getElementById('motivo');
            let existeOpcion = Array.from(selectMotivo.options).some(opt => opt.value === motivoQR);
            
            if (!existeOpcion && motivoQR !== "") {
                let nuevaOpt = new Option(motivoQR, motivoQR);
                selectMotivo.add(nuevaOpt);
            }
            selectMotivo.value = motivoQR;

            // Actualizar interfaz
            toggleVehiculo();
            verificarMotivoEspecial();

            if (partes[3] === 'vehicular') {
                document.getElementById('patente').value = partes[4] || "";
            }
            
            if (partes[6] && partes[6] !== "SD") {
                document.getElementById('detalleVisita').value = partes[6];
            }

            alert("✅ PASE VÁLIDO\nGenerado a las: " + horaLeible);
            return;
        }
    }

    // 3. CASO CARNET FÍSICO (PDF417)
    if (dataCorregida.split('|').length > 10) {
        const partes = dataCorregida.split('|');
        let runRaw = partes[0].replace(/^0+/, '');
        let runFinal = (!runRaw.includes('-')) ? runRaw.slice(0, -1) + "-" + runRaw.slice(-1) : runRaw;
        document.getElementById('run').value = formatearRUT(runFinal);
        document.getElementById('nombreCompleto').value = `${partes[3]} ${partes[1]} ${partes[2]}`;
        return;
    }

    // 4. CASO RUT SUELTO
    const regexRUT = /(\d{1,2}\.?\d{3}\.?\d{3}-?[\dkK]{1})/;
    const coincidencia = dataCorregida.match(regexRUT);
    if (coincidencia) {
        let run = coincidencia[0].replace(/\./g, '');
        if (!run.includes('-')) run = run.slice(0, -1) + "-" + run.slice(-1);
        document.getElementById('run').value = run.toUpperCase();
        document.getElementById('nombreCompleto').focus();
    }
}

// --- ENVÍO DE DATOS ---
document.getElementById('registroForm').onsubmit = async function(e) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    
    if (!validarRUT(document.getElementById('run').value)) {
        return alert("RUT Inválido");
    }

    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyVTzRclzL0VMeDBbQmw6-6c0OkYQpF-2SvqmIe6wJhsiXTnnQrHaxiR6JbrpsHvdXo8Q/exec";

    const datos = {
        run: document.getElementById('run').value,
        nombre: document.getElementById('nombreCompleto').value,
        tipo: document.getElementById('tipoEntrada').value,
        patente: document.getElementById('patente').value || "N/A",
        motivo: document.getElementById('motivo').value,
        detalle: document.getElementById('detalleVisita').value || "N/A"
    };

    try {
        btn.disabled = true;
        btn.innerText = "Guardando...";
        await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
        
        alert("✅ Registro Guardado Exitosamente");
        this.reset();
        document.getElementById('campoPatente').style.display = 'none';
        document.getElementById('contenedorExtra').style.display = 'none';
    } catch (error) {
        alert("❌ Error al conectar con el servidor");
    } finally {
        btn.disabled = false;
        btn.innerText = "Finalizar Registro";
    }
};
</script>
</body>
</html>
