<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Acceso Dual - Chile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; display: none; margin-bottom: 20px; }
        .scanner-input-group { background: #e9ecef; border: 2px dashed #ced4da; padding: 15px; border-radius: 20px; margin-bottom: 20px}
        #campoPatente { display: none; } /* Oculto por defecto */
    /* Hace que las opciones largas del menú se vean completas en el celular */
        .form-select {
            white-space: normal !important;
            height: auto !important;
            min-height: 50px;
        }

        /* Estilo para resaltar el campo cuando el RUT es válido o inválido */
        .is-invalid {
            border-color: #dc3545 !important;
            background-image: none !important;
        }
        
        /* Estilo para el contenedor de la cámara para que no sea gigante */
        #reader {
            width: 100% !important;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ddd !important;
        }

        /* Estilo para que el botón de escaneo se vea más llamativo */
        .btn-scan {
            background-color: #6c5ce7;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <h2 class="text-center mb-4">Registro de Ingreso</h2>

            <div class="text-center mb-3">
                <button class="btn btn-primary w-100 mb-2" onclick="encenderCamara()">
                    Usar Cámara del Dispositivo
                </button>
                <div id="reader"></div> </div>


            <div class="scanner-input-group">
            <div class="text-center mb-3">
                <label class="form-label"><strong>Lector de Carnet</strong></label>
                <input type="text" id="inputScanner" class="form-control" placeholder="Haga clic aquí y escanee el carnet..." onkeypress="manejarEscaneoPistola(event)">
                <small class="text-muted">Si usa escáner de pistola, el cursor debe estar aquí.</small>
            </div>
         </div>

            <form id="registroForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">RUN (Cédula)</label>
                      <input type="text" id="run" class="form-control" 
       placeholder="12345678-9" 
       oninput="this.value = formatearRUT(this.value); revisarValidezRUT(this.value)" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="nombreCompleto" class="form-control" placeholder="Juan Pérez Tapia" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipo de Entrada</label>
                        <select id="tipoEntrada" class="form-select" onchange="toggleVehiculo()">
                            <option value="peatonal">Peatonal</option>
                            <option value="vehicular">Vehicular</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3" id="campoPatente">
                        <label class="form-label text-primary"><strong>Patente del Vehículo</strong></label>
                        <input type="text" id="patente" class="form-control border-primary" placeholder="ABCD12">
                    </div>
                </div>

               <div class="row">
    <div class="col-md-6 mb-3">
        <label class="form-label">Motivo de Ingreso</label>
        <select id="motivo" class="form-select" onchange="verificarMotivoEspecial()">
            <option value="">Seleccione una opción...</option>
            <option value="APODERADO-RETIRO ESTUDIANTE/ENFERMERÍA">Apoderado-Retiro Estudiante/Enfermería</option>
            <option value="APODERADO-ENTREGA DE ELEMENTOS">Apoderado-Entrega de elementos</option>
            <option value="APODERADO-SELECCIONES/TALLERES CPDV">Apoderado-Selecciones/Talleres CPDV</option>
            <option value="APODERADO-CITA ADMISIÓN/RECAUDACIÓN">Apoderado-Cita Admisión/recaudación</option>
            <option value="APODERADO-CITA DOCENTE">Apoderado-Cita docente</option>
            <option value="VISITA-ISP">Visita-ISP</option>
            <option value="VISITA-SCHOOL TOUR/ADMISIÓN/RECAUDACIÓN">Visita-School tour/Admisión/Recaudación</option>
            <option value="VISITA-ENTREVISTA">Visita-Entrevista</option>
            <option value="VISITA-PERSONAL DE APOYO (PSICOLOGÍA, TERAPIA OCUPACIONAL)">Visita-Personal de apoyo (Psicología, Terapia ocupacional)</option>
            <option value="VISITA-ARRIENDOS">Visita-Arriendos</option>
            <option value="VISITA-PROVEEDORES">Visita-Proveedores</option>
        </select>
    </div>

    <div class="col-md-6 mb-3" id="contenedorExtra" style="display: none;">
        <label class="form-label" id="labelExtra">Detalle de Visita</label>
        <input type="text" id="detalleVisita" class="form-control" placeholder="">
    </div>
</div>

                
<div class="col-md-6 mb-3" id="contenedorReferencia" style="display: none;">
        <label class="form-label" id="labelReferencia">Referencia</label>
        <input type="text" id="nombreReferencia" class="form-control" placeholder="...">
    </div>

                    
                <button type="submit" class="btn btn-success w-100 btn-lg">Finalizar Registro</button>
            </form>
        </div>
    </div>
</div>

<script>
    function formatearRUT(rut) {
    // 1. Limpiamos: quitamos puntos, guiones y espacios
    let valor = rut.replace(/\./g, '').replace(/-/g, '').trim();
    if (valor.length < 2) return valor;

    // 2. Separamos el cuerpo del dígito verificador (el último carácter)
    let cuerpo = valor.slice(0, -1);
    let dv = valor.slice(-1).toUpperCase(); // Aseguramos que la 'K' sea mayúscula

    // 3. Retornamos el cuerpo unido al DV por un guion
    return cuerpo + "-" + dv;
}
    function validarRUT(rut) {
    // 1. Limpieza total
    let valor = rut.replace(/\./g, '').replace(/-/g, '').toUpperCase();
    if (valor.length < 8) return false;

    // 2. Separar Cuerpo y Dígito Verificador
    let cuerpo = valor.slice(0, -1);
    let dv = valor.slice(-1);

    // 3. Calcular Dígito Verificador esperado (Algoritmo Módulo 11)
    let suma = 0;
    let multiplo = 2;

    for (let i = 1; i <= cuerpo.length; i++) {
        let index = multiplo * valor.charAt(cuerpo.length - i);
        suma = suma + index;
        if (multiplo < 7) { multiplo = multiplo + 1; } else { multiplo = 2; }
    }

    let dvEsperado = 11 - (suma % 11);
    dv = (dv == 'K') ? 10 : dv;
    dv = (dv == 0) ? 11 : dv;

    // 4. Comparar lo ingresado con lo calculado
    if (dvEsperado != dv) { return false; }
    return true;
}
    function revisarValidezRUT(valor) {
    const input = document.getElementById('run');
    if (valor.length > 8) {
        if (validarRUT(valor)) {
            input.style.borderColor = "#28a745"; // Verde si es válido
            input.classList.remove("is-invalid");
        } else {
            input.style.borderColor = "#dc3545"; // Rojo si es inválido
            input.classList.add("is-invalid");
        }
    }
}

    function verificarMotivoEspecial() {
    const motivo = document.getElementById('motivo').value;
    const contenedor = document.getElementById('contenedorExtra');
    const label = document.getElementById('labelExtra');
    const input = document.getElementById('detalleVisita');

    // Verificamos si la opción seleccionada es Proveedores o Arriendos
    if (motivo === "VISITA-PROVEEDORES") {
        contenedor.style.display = "block";
        label.innerText = "Nombre de la Empresa / Proveedor";
        input.placeholder = "Ej: Soprole, Chilexpress, etc.";
    } 
    else if (motivo === "VISITA-ARRIENDOS") {
        contenedor.style.display = "block";
        label.innerText = "Nombre de la Organización / Arrendatario";
        input.placeholder = "Ej: Club Deportivo, Evento X, etc.";
    } 
    else {
        // Para cualquier otra opción, ocultamos el campo y lo limpiamos
        contenedor.style.display = "none";
        input.value = "";
    }
}
// --- ESCANEO ---    
    let html5QrCode;

    // --- LÓGICA DE LA CÁMARA ---
 function encenderCamara() {
    const readerDiv = document.getElementById('reader');
    readerDiv.style.display = 'block';

    // Eliminamos la restricción de formato para que lea QR y PDF417
    html5QrCode = new Html5Qrcode("reader");

    const config = { 
        fps: 20, 
        qrbox: { width: 300, height: 200 }, // Caja más versátil
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (decodedText) => {
            procesarDatosChile(decodedText);
            // No detenemos la cámara de inmediato para que el usuario vea el éxito
            setTimeout(() => {
                html5QrCode.stop();
                readerDiv.style.display = 'none';
            }, 1000);
        },
        (errorMessage) => { /* Buscando... */ }
    ).catch(err => alert("Error: " + err));
}
    // --- LÓGICA DE LA PISTOLA ---
    function manejarEscaneoPistola(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            procesarDatosChile(event.target.value);
            event.target.value = '';
        }
    }

// --- PROCESADOR CENTRAL DE DATOS (LA GRAN MEJORA) ---
function procesarDatosChile(data) {
    console.log("Datos recibidos:", data);

    // 1. Caso PASE DE INVITADO (Tu nuevo sistema)
    if (data.startsWith("PASE|")) {
      // Índices: 0:PASE, 1:RUT, 2:NOMBRE, 3:TIPO, 4:PATENTE, 5:MOTIVO, 6:DETALLE, 7:TIMESTAMP
    const timestampCreacion = parseInt(partes[7]); // El tiempo ahora está en el 7
    const ahora = Date.now();
    const tresHoras = 3 * 60 * 60 * 1000;

        if (ahora - timestampCreacion > tresHoras) {
            alert("❌ EL PASE HA EXPIRADO.");
            return;
        }

        document.getElementById('run').value = partes[1];
        document.getElementById('nombreCompleto').value = partes[2];
        document.getElementById('tipoEntrada').value = partes[3];
        document.getElementById('motivo').value = partes[5];

       // Activar visibilidad de campos extras
    toggleVehiculo();
    verificarMotivoEspecial();

    // Llenar campos específicos si existen
    if (partes[3] === 'vehicular') {
        document.getElementById('patente').value = partes[4];
    }
    
    // AQUÍ CARGAMOS EL DETALLE DE VISITA (Empresa/Arrendatario)
    if (partes[6] && partes[6] !== "N/A") {
        document.getElementById('detalleVisita').value = partes[6];
    }

    alert("✅ Pase de Invitado Cargado con Detalle: " + partes[2]);
    return;
}

    // 2. Caso PDF417 (Reverso del carnet)
    if (data.includes('|')) {
        const partes = data.split('|');
        if (partes.length >= 4) {
            let runRaw = partes[0].replace(/^0+/, '');
            let runFinal = (!runRaw.includes('-')) ? runRaw.slice(0, -1) + "-" + runRaw.slice(-1) : runRaw;
            document.getElementById('run').value = formatearRUT(runFinal);
            document.getElementById('nombreCompleto').value = `${partes[3]} ${partes[1]} ${partes[2]}`;
            alert("✅ Datos cargados desde carnet (PDF417)");
            return;
        }
    }

    // 3. Caso QR Frente o Escaneo Genérico de RUN
    const regexRun = /(\d{1,2}\.?\d{3}\.?\d{3}-?[\dkK]{1})|(\d{7,8}[\dkK]{1})/;
    const match = data.match(regexRun);
    if (match) {
        let runEncontrado = match[0].replace(/\./g, '');
        if (!runEncontrado.includes('-')) {
            runEncontrado = runEncontrado.slice(0, -1) + "-" + runEncontrado.slice(-1);
        }
        document.getElementById('run').value = runEncontrado;
        document.getElementById('nombreCompleto').focus();
        alert("✅ RUN detectado: " + runEncontrado + "\nPor favor, ingrese el nombre.");
    } else {
        alert("Contenido no reconocido:\n" + data);
    }
}
    
   // 2. Definimos la URL de tu Google Apps Script (La que termina en /exec)
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyVTzRclzL0VMeDBbQmw6-6c0OkYQpF-2SvqmIe6wJhsiXTnnQrHaxiR6JbrpsHvdXo8Q/exec"; 

    const datos = {
        run: document.getElementById('run').value,
        nombre: document.getElementById('nombreCompleto').value,
        tipo: document.getElementById('tipoEntrada').value, // Peatonal/Vehicular
        patente: document.getElementById('patente').value || "N/A",
        motivo: document.getElementById('motivo').value, 
        detalle: document.getElementById('detalleVisita').value || "N/A" // Capturamos el detalle (Proveedor/Arriendo) o ponemos N/A si está oculto
    };
// 4. Enviamos los datos a la nube
    try {
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true; // Desactivamos el botón para evitar doble clic
        btn.innerText = "Guardando...";
        
        const response = await fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors', // Importante para evitar bloqueos de seguridad simples
            cache: 'no-cache',
            body: JSON.stringify(datos)
        });

        // 5. Éxito: Limpiamos y avisamos
alert("✅ Registro guardado exitosamente en la base de datos.");
        this.reset(); // Limpia todos los campos
        document.getElementById('contenedorExtra').style.display = 'none'; // Oculta el campo extra
        document.getElementById('campoPatente').style.display = 'none'; // Oculta patente
        btn.disabled = false;
        btn.innerText = "Finalizar Registro";
        
    } catch (error) {
        console.error("Error:", error);
        alert("❌ Error al conectar con la base de datos. Revisa la conexión.");
    }

       
       
};
</script>

</body>
</html>
